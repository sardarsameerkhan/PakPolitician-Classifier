stages:
	collect_images:
		cmd: python src/collect_dataset.py
		deps:
			- src/collect_dataset.py
			- params.yaml
		params:
			- dataset.min_images_per_class
			- dataset.download_images_per_class
			- dataset.min_width
			- dataset.min_height
			- dataset.classes
			- dataset.class_queries
		outs:
			- data/raw
			- reports/download_summary.json

	split_dataset:
		cmd: python src/split_dataset.py
		deps:
			- src/split_dataset.py
			- params.yaml
			- data/raw
		params:
			- dataset.random_state
			- dataset.split
			- dataset.min_images_per_class
			- dataset.classes
		outs:
			- dataset/train
			- dataset/val
			- dataset/test
			- reports/split_summary.json

	verify_dataset:
		cmd: python src/verify_dataset.py
		deps:
			- src/verify_dataset.py
			- params.yaml
			- dataset/train
			- dataset/val
			- dataset/test
			- reports/split_summary.json
		metrics:
			- reports/dataset_report.json
